<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula de Estruturas de Repetição</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2f3;
            color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .box-aula {
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 450px;
        }
        h1 {
            color: #2980b9;
            margin-bottom: 10px;
        }
        code {
            background-color: #f8f9fa;
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid #e1e8ed;
            font-weight: bold;
            color: #e74c3c;
        }
    </style>
</head>
<body>
    <div class="box-aula">
        <h1>Loops em JavaScript</h1>
        <p>O navegador está processando repetições automatizadas em segundo plano neste exato momento!</p>
        <p>Abra o painel do programador apertando <strong>F12</strong> e clique na aba <code>Console</code> para ver os laços em ação.</p>
    </div>
    <script src="estRepeticao.js"></script>
</body>
</html>
