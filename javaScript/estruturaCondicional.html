<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula de Estruturas Condicionais</title>
    <style>
        /* Um estilo rápido apenas para não ficar uma tela feia para os alunos */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            text-align: center;
            padding-top: 50px;
        }
        .container {
            background-color: white;
            max-width: 500px;
            margin: 0 auto;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }
        span {
            background-color: #e2e8f0;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Controlando o Fluxo com JS</h1>
        <p>Esta página está executando testes de tomada de decisão nos bastidores.</p>
        <p>Pressione a tecla <strong>F12</strong> no seu teclado e clique na aba <span>Console</span> para acompanhar os resultados dos testes.</p>
    </div>

    <script src="estruturaCondicional.js"></script>
</body>
</html>
