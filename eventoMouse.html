<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratório de Eventos de Mouse Completo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Laboratório Avançado do Mouse 🖱️</h1>
    <p>Interaja com o bloco abaixo para testar os 7 eventos de mouse via JavaScript.</p>

    <div class="layout">
        <div id="zona-teste">
            <span id="texto-principal">Passe o mouse aqui</span>
            <small id="coordenadas">Mova o mouse para ler a posição</small>
        </div>

        <div class="painel-status">
            <h3>Monitores de Eventos</h3>
            <div class="luz-indicadora" id="ind-mouseenter">mouseenter</div>
            <div class="luz-indicadora" id="ind-mousemove">mousemove</div>
            <div class="luz-indicadora" id="ind-mousedown">mousedown</div>
            <div class="luz-indicadora" id="ind-mouseup">mouseup</div>
            <div class="luz-indicadora" id="ind-click">click</div>
            <div class="luz-indicadora" id="ind-dblclick">dblclick</div>
            <div class="luz-indicadora" id="ind-contextmenu">contextmenu</div>
            <div class="luz-indicadora" id="ind-mouseleave">mouseleave</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
