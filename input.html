<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Exemplo Simples - Evento Input</title>
    <link rel="stylesheet" href="input.css">
</head>
<body>

    <h1>Simulador de Cartão 💳</h1>
    <p>Veja o poder do evento <strong>input</strong> atualizando os dados instantaneamente.</p>

    <div class="formulario">
        <label for="nome-usuario">Digite seu nome completo:</label>
        <input type="text" id="nome-usuario" placeholder="Ex: JORGE DA SILVA" autocomplete="off">
    </div>

    <div class="cartao">
        <div class="chip"></div>
        <div class="numero-cartao">•••• •••• •••• 4321</div>
        <div id="nome-cartao">NOME DO TITULAR</div>
    </div>

    <script src="input.js"></script>
</body>
</html>
